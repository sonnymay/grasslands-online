name: Vercel Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ inputs.target == 'production' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: |
          if [ "${{ inputs.target }}" = "production" ]; then
            vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }}
          fi
